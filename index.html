<!DOCTYPE html>
<html lahg="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <link rel="stylesheet" href="./style.css" type="text/css ">
</head>

<body>
    <div class="content_wrapper">
        <header class="logo_wrapper ">
            <img src="./images/Logo.png " alt="logo">
        </header>
        <div class="text_social ">WE ARE SOCIAL</div>
        <div class="separator"></div>
        <div class="items">
            <div class="item">
                <a href="https://www.facebook.com/" title="Facebook" target="_blank">
                    <img src="./images/Facebook.png" alt="Facebook" class="social_media_logo" />
                </a>
            </div>
            <div class="item">
                <a href="https://twitter.com/" title="Twitter" target="_blank">
                    <img src="./images/Twitter.png" alt="Twitter" class="social_media_logo" />
                </a>
            </div>
            <div class="item">
                <a href="https://www.google.com.ua/" title="Coogle" target="_blank">
                    <img src="./images/Google.png" alt="Coogle" class="social_media_logo" />
                </a>
            </div>
            <div class="item">
                <a href="https://dribbble.com/" title="Dribble" target="_blank">
                    <img src="./images/Dribble.png" alt="Dribble" class="social_media_logo" />
                </a>
            </div>
        </div>
        <footer class="footer ">
            <p>©2014-<span class="company_name">Kasper</span>All Right Reserved</p>
        </footer>
    </div>
</body>

</html>
